<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">
<meta name="theme-color" content="#F5F5F7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>플래너</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --bg:#F5F5F7; --panel:#EFEFF2; --card:#FFFFFF;
    --text:#1D1D1F; --sub:#86868B; --border:rgba(0,0,0,.08);
    --soft:rgba(0,0,0,.05); --soft2:rgba(0,0,0,.045); --soft3:rgba(0,0,0,.03);
    --blue:#0A6CFF; --blue-soft:rgba(10,108,255,.1);
    --red:#FF453A; --orange:#FF9F0A; --green:#28C840; --purple:#BF5AF2;
    --nav-bg:rgba(245,245,247,.95);
  }
  [data-theme="dark"]{
    --bg:#1C1C1E; --panel:#242426; --card:#2C2C2E;
    --text:#F2F2F7; --sub:#98989E; --border:rgba(255,255,255,.12);
    --soft:rgba(255,255,255,.10); --soft2:rgba(255,255,255,.08); --soft3:rgba(255,255,255,.06);
    --blue:#0A84FF; --blue-soft:rgba(10,132,255,.2);
    --nav-bg:rgba(28,28,30,.95);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overscroll-behavior:none;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    font-size:14px; display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:8px;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 10px;
    background:var(--bg); position:sticky; top:0; z-index:5;
  }
  header h1{font-size:19px; font-weight:700; margin:0; flex:1;}
  .icon-btn{
    width:34px; height:34px; border:none; border-radius:10px;
    background:var(--soft); color:var(--text); font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  main{flex:1; overflow-y:auto; padding:0 16px 90px; overscroll-behavior-y:contain;}
  /* 당겨서 새로고침 (달력 탭) */
  .ptr{
    position:fixed; top:60px; left:50%; z-index:40;
    transform:translate(-50%,-70px); transition:transform .18s ease;
    display:flex; align-items:center; gap:7px; pointer-events:none;
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:8px 14px; font-size:12px; color:var(--sub);
    box-shadow:0 4px 16px rgba(0,0,0,.12); white-space:nowrap;
  }
  .ptr-sp{
    width:13px; height:13px; border-radius:50%; flex-shrink:0;
    border:2px solid var(--border); border-top-color:var(--blue);
    animation:ptrspin .7s linear infinite;
  }
  @keyframes ptrspin{to{transform:rotate(360deg)}}
  /* 하단 탭 */
  nav{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    display:flex; background:var(--nav-bg); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  nav button{
    flex:1; border:none; background:none; padding:8px 0 6px;
    font-size:11px; color:var(--sub); font-family:inherit;
  }
  nav button .ic{display:block; font-size:20px; margin-bottom:2px;}
  nav button.on{color:var(--blue); font-weight:600;}
  /* 공통 */
  .chip{
    display:inline-block; border:none; padding:6px 13px; border-radius:20px;
    background:var(--soft); color:var(--text); font-size:12px; font-family:inherit;
    white-space:nowrap; /* 칩 안 글자는 항상 한 줄 */
  }
  .chip.on{background:var(--text); color:var(--bg); font-weight:600;}
  .chips{display:flex; gap:6px; overflow-x:auto; padding:4px 0 10px; scrollbar-width:none;}
  .chips .chip{flex-shrink:0;} /* 칩이 눌려 찌그러지지 않도록 */
  .chips.wrap{flex-wrap:wrap; overflow-x:visible;} /* 폴더 칩: 많으면 줄바꿈 */
  .chips::-webkit-scrollbar{display:none;}
  /* 구글 캘린더 계정 행 + 토글 스위치 */
  .gc-acct{gap:8px; margin:6px 0; align-items:center;}
  .gc-em{flex:1; font-size:12px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.35;}
  .sw{position:relative; display:inline-block; width:38px; height:22px; flex-shrink:0;}
  .sw input{position:absolute; opacity:0; width:0; height:0;}
  .sw i{position:absolute; inset:0; border-radius:22px; background:var(--soft); transition:background .15s; border:1px solid var(--border);}
  .sw i::after{content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:16px;
    background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .15s;}
  .sw input:checked + i{background:var(--green); border-color:var(--green);}
  .sw input:checked + i::after{transform:translateX(16px);}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:12px; margin-bottom:8px;
  }
  .sub{color:var(--sub); font-size:11px;}
  .dot{display:inline-block; width:8px; height:8px; border-radius:8px; flex-shrink:0;}
  .empty{
    text-align:center; color:var(--sub); font-size:13px;
    background:var(--soft3); border-radius:14px; padding:32px 16px;
  }
  input,select,textarea{
    font-family:inherit; font-size:14px; color:var(--text);
    background:var(--soft2); border:none; border-radius:10px;
    padding:10px 12px; outline:none; width:100%;
  }
  .btn{
    border:none; border-radius:12px; background:var(--blue); color:#fff;
    font-size:14px; font-weight:600; padding:12px; width:100%; font-family:inherit;
  }
  .row{display:flex; align-items:center; gap:8px;}
  .x{border:none; background:none; color:var(--sub); font-size:13px; padding:4px;
    display:inline-flex; align-items:center; justify-content:center;}
  /* FAB */
  .fab{
    position:fixed; right:18px; bottom:calc(72px + env(safe-area-inset-bottom,0px));
    width:52px; height:52px; border-radius:50%; border:none; z-index:9;
    background:var(--blue); color:#fff; font-size:26px; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(10,108,255,.35);
  }
  /* 바텀 시트 */
  .sheet-bg{
    position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:20;
    display:none; align-items:flex-end;
  }
  .sheet-bg.open{display:flex;}
  .sheet{
    background:var(--card); width:100%; border-radius:18px 18px 0 0;
    padding:18px 18px calc(24px + env(safe-area-inset-bottom,0px));
    max-height:85vh; overflow-y:auto;
  }
  .sheet h3{margin:0 0 12px; font-size:16px;}
  /* 달력 */
  .cal-head{display:flex; align-items:center; gap:6px; margin:4px 0 10px;}
  .cal-head .title{font-size:18px; font-weight:700; flex:1;}
  .dow{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px;}
  .dow span{text-align:center; font-size:11px; font-weight:600; color:var(--sub); padding:2px 0;}
  .dow span:first-child{color:var(--red);} .dow span:last-child{color:var(--blue);}
  .grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:1px;
    background:var(--border); border:1px solid var(--border);
    border-radius:14px; overflow:hidden;
  }
  .cell{background:var(--card); min-height:58px; padding:3px; font-size:11px;}
  .cell.sel{background:var(--blue-soft);}
  .cell .d{
    display:inline-block; min-width:19px; text-align:center; border-radius:10px;
    font-weight:600; line-height:18px;
  }
  .cell.today .d{background:var(--red); color:#fff;}
  .cell:nth-child(7n+1):not(.today) .d{color:var(--red);}
  .cell:nth-child(7n):not(.today) .d{color:var(--blue);}
  .cell.hol:not(.today) .d{color:var(--red);}
  .hname{font-size:8px; color:var(--red); font-weight:600; margin-left:2px;
    display:inline-block; max-width:calc(100% - 23px); overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; vertical-align:top; line-height:18px;}
  .wk-hol{font-size:10px; color:var(--red); font-weight:600; margin-right:6px;}
  .wk-num.hol:not(.today){color:var(--red);}
  .ev{
    font-size:9px; font-weight:500; border-radius:4px; padding:0 3px; margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .more{font-size:9px; color:var(--sub); padding-left:3px;}
  .day-title{display:flex; align-items:center; margin:16px 0 8px;}
  .day-title b{font-size:15px; flex:1;}
  /* 체크 항목 */
  .ck{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px;}
  .ck input[type=checkbox]{width:17px; height:17px; accent-color:var(--blue); padding:0;}
  .done{color:var(--sub); text-decoration:line-through;}
  /* 할 일 행 */
  .todo{display:flex; align-items:center; gap:9px;}
  .todo.tw{align-items:flex-start;}
  .todo.tw input[type=checkbox]{margin-top:1px;}
  .todo .tcol{flex:1; min-width:0; display:flex; flex-direction:column;}
  .tmeta{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap;}
  .tmeta .sub{font-size:11px;}
  .tmeta .x{padding:2px 7px; font-size:12.5px; margin-left:0;}
  .tmeta .sp{flex:1;}
  .todo input[type=checkbox]{width:18px; height:18px; accent-color:var(--blue); flex-shrink:0; padding:0;}
  .todo .t{flex:1; font-size:13px; white-space:pre-wrap; word-break:break-word;}
  .badge{font-size:10px; padding:2px 8px; border-radius:12px; background:var(--soft); color:var(--sub); flex-shrink:0;}
  .badge.over{background:var(--red); color:#fff;}
  /* 메모 */
  .memo-item .ttl{font-size:13px; font-weight:600; display:flex; gap:4px; align-items:center;}
  .memo-item .pv{font-size:11px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .editor{position:fixed; inset:0; background:var(--bg); z-index:30; display:none; flex-direction:column;}
  .editor.open{display:flex;}
  .editor header{padding-top:calc(env(safe-area-inset-top,0px) + 10px);}
  .editor input.ttl{background:none; font-size:19px; font-weight:700; padding:4px 0; border-radius:0;}
  .editor textarea{flex:1; resize:none; line-height:1.7; margin-top:8px; background:var(--card); border:1px solid var(--border);}
  .editor .body{flex:1; display:flex; flex-direction:column; padding:0 16px calc(16px + env(safe-area-inset-bottom,0px));}
  /* 검색 */
  .sec{font-size:11px; font-weight:700; letter-spacing:.4px; color:var(--sub); margin:14px 2px 6px;}
  /* 자식 메모 */
  .notes{margin-top:8px; display:flex; flex-direction:column; gap:4px;}
  .note{display:flex; align-items:center; gap:8px; background:var(--soft3);
    border-radius:10px; padding:7px 10px 7px 12px; font-size:12.5px; color:var(--text);
    line-height:1.55; cursor:pointer;}
  .note::before{content:'↳'; color:var(--sub); font-size:11px; flex-shrink:0;}
  .note span{flex:1; white-space:pre-wrap; word-break:break-word;}
  .note .x{opacity:.7;}
  .note-add{font-size:11px; padding:4px 10px;}
  .note-in{font-size:12px; padding:7px 10px; margin-top:4px;}
  .note input[type=checkbox]{width:16px; height:16px; accent-color:var(--blue); flex-shrink:0; padding:0;}
  /* 하단 빠른 입력줄 (To-do · 메모 탭) */
  .qa{position:fixed; left:12px; right:12px; bottom:calc(64px + env(safe-area-inset-bottom,0px));
    z-index:8; background:var(--card); border:1px solid var(--border); border-radius:16px;
    box-shadow:0 8px 24px rgba(0,0,0,.18); display:flex; align-items:flex-end; gap:6px; padding:8px;}
  .qa .qa-fold{max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    flex-shrink:0; margin-bottom:3px;}
  .qa textarea{flex:1; resize:none; font-size:13px; line-height:1.5; padding:8px 10px;
    max-height:96px; background:var(--soft3); border:none; border-radius:10px; min-width:0;}
  .qa .qa-send{width:34px; height:34px; border:none; border-radius:10px; background:var(--blue);
    color:#fff; font-size:15px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .chip .fdot{display:inline-block; width:8px; height:8px; border-radius:8px; margin-right:5px; vertical-align:middle;}
  .man-row{display:flex; gap:10px; align-items:flex-start; padding:5px 2px;}
  .man-ic{width:30px; flex-shrink:0; text-align:center; font-size:13px; line-height:1.5;}
  .man-row b{display:block; font-size:12.5px; color:var(--text);}
  .man-row span:last-child{font-size:11.5px; color:var(--sub); line-height:1.5;}
  /* 공유 댓글 */
  .cmts{margin:8px 0 6px; padding-left:8px; border-left:2px solid var(--border); display:flex; flex-direction:column; gap:6px;}
  .cmt-h{display:flex; gap:6px; align-items:baseline; font-size:11px;}
  .cmt-h b{color:var(--text); font-size:12px;}
  .cmt-b{font-size:12.5px; color:var(--text); white-space:pre-wrap; word-break:break-word; line-height:1.5;}
  /* 일괄 선택 */
  .selring{width:20px; height:20px; border-radius:50%; border:2px solid var(--sub);
    flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;}
  .selring.on{background:var(--blue); border-color:var(--blue);}
  .selring.on::after{content:'✓'; color:#fff; font-size:11px; font-weight:700;}
  .selbar{position:fixed; left:12px; right:12px; bottom:calc(64px + env(safe-area-inset-bottom,0px));
    z-index:9; background:var(--card); border:1px solid var(--border); border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.28); display:flex; align-items:center; gap:6px;
    padding:10px 12px; font-size:13px; color:var(--text);}
  /* 커스텀 다이얼로그 */
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:70;
    display:none; align-items:center; justify-content:center; padding:36px 28px;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--card); border-radius:18px; padding:20px 18px; width:100%; max-width:320px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);}
  .modal-t{font-size:15px; font-weight:700; margin-bottom:6px; color:var(--text);}
  .modal-m{font-size:13px; line-height:1.65; color:var(--sub); margin:0; white-space:pre-wrap;}
  .modal-btns{display:flex; gap:8px; margin-top:16px;}
  .modal-btns .btn{padding:11px;}
  .mghost{background:var(--soft) !important; color:var(--text) !important;}
  .mdanger{background:var(--red) !important;}
  /* 주간 뷰 */
  .wk{display:flex; flex-direction:column; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  .wk-day{display:flex; gap:10px; background:var(--card); padding:8px 10px; min-height:44px;}
  .wk-day.sel{background:var(--blue-soft);}
  .wk-h{display:flex; flex-direction:column; align-items:center; width:32px; flex-shrink:0;}
  .wk-dow{font-size:10px; font-weight:600;}
  .wk-num{font-size:14px; font-weight:600; min-width:24px; text-align:center; border-radius:12px; line-height:22px;}
  .wk-num.today{background:var(--red); color:#fff;}
  .wk-evs{flex:1; display:flex; flex-direction:column; gap:2px; min-width:0;}
  .wk-evs .ev{font-size:11px;}
  /* 드래그 이동 */
  .ev[data-evid]{touch-action:none;}
  .cell.drop{outline:2px solid var(--blue); outline-offset:-2px;}
  #drag-ghost{position:fixed; z-index:60; pointer-events:none; background:var(--blue); color:#fff;
    font-size:12px; padding:5px 12px; border-radius:10px; transform:translate(-50%,-130%);
    box-shadow:0 6px 16px rgba(0,0,0,.35); white-space:nowrap;}
  /* 색상 선택 */
  .swatches{display:flex; gap:8px; flex-wrap:wrap; padding:2px 0 12px;}
  .sw{width:26px; height:26px; border-radius:50%; border:2px solid transparent; padding:0;}
  .sw.on{border-color:var(--text); box-shadow:0 0 0 2px var(--bg) inset;}
  .sw.rainbow{background:conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);}
  /* 달력 dot 형 일정 */
  .ev.dotline{display:flex; align-items:center; gap:3px; background:none !important; color:var(--text); padding-left:0;}
  .ev.dotline .dt{width:5px; height:5px; border-radius:5px; flex-shrink:0;}
  .ev.dotline em{font-style:normal; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
</style>
</head>
<body>

<header>
  <h1 id="page-title">달력</h1>
  <span id="sync-dot" class="dot" style="background:#C7C7CC" title="동기화 상태"></span>
  <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  <button class="icon-btn" onclick="openAccount()">👤</button>
  <button class="icon-btn" onclick="openSearch()">🔍</button>
</header>

<main id="main"></main>
<div id="ptr" class="ptr"></div>

<button class="fab" id="fab" onclick="onFab()">＋</button>

<nav>
  <button id="tab0" onclick="go(0)"><span class="ic">📅</span>달력</button>
  <button id="tab1" onclick="go(1)"><span class="ic">☑️</span>To-do</button>
  <button id="tab2" onclick="go(2)"><span class="ic">📝</span>메모</button>
</nav>

<!-- 바텀 시트 -->
<div class="sheet-bg" id="sheet-bg" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<!-- 커스텀 다이얼로그 -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<!-- 메모 에디터 -->
<div class="editor" id="editor">
  <header>
    <button class="icon-btn" onclick="closeEditor()">‹</button>
    <h1 style="font-size:16px">메모</h1>
    <button class="icon-btn" id="save-btn" title="저장" onclick="saveMemoNow()" style="color:var(--blue);font-weight:700">✓</button>
    <button class="icon-btn" id="pin-btn" onclick="togglePin()">📌</button>
    <button class="icon-btn" onclick="deleteMemo()">🗑</button>
  </header>
  <div class="body">
    <input class="ttl" id="ed-title" placeholder="제목">
    <div class="chips" id="ed-folders" style="padding:6px 0 2px"></div>
    <div class="sub" id="ed-updated"></div>
    <textarea id="ed-body" placeholder="메모를 입력하세요…"></textarea>
    <div id="ed-notes" style="padding:8px 0 0"></div>
  </div>
</div>

<script>
/* ================= 저장소 (localStorage, 실패 시 메모리) ================= */
let mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};
const KEY = 'planner_web_v1';
const APP_VERSION = 'v8.8';

/* ================= 상태 ================= */
const pad = n => String(n).padStart(2,'0');
const keyOf = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const todayKey = () => { const n=new Date(); return keyOf(n.getFullYear(),n.getMonth(),n.getDate()); };
const nowStr = () => { const n=new Date(); return `${todayKey()} ${pad(n.getHours())}:${pad(n.getMinutes())}`; };
let _id = Date.now()%1e6;
const uid = () => String(++_id);

const TYPES = { allday:['종일','var(--blue)'], timed:['시간','var(--purple)'], memo:['메모','var(--orange)'], checklist:['체크','var(--green)'] };
const PRI = { high:['높음','var(--red)'], mid:['중간','var(--orange)'], low:['낮음','var(--green)'] };
const PALETTE = ['#0A6CFF','#BF5AF2','#FF453A','#FF9F0A','#28C840','#64D2FF','#FF6482','#8E8E93'];
const ICO_EDIT = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
  stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block">
  <path d="M12 4.5H6a2 2 0 0 0-2 2v11.5a2 2 0 0 0 2 2h11.5a2 2 0 0 0 2-2V12"/>
  <path d="M18.2 2.9a1.9 1.9 0 0 1 2.7 2.7L13 13.5l-3.6.9.9-3.6z"/></svg>`;
const evColor = e => e.color || {allday:'#0A6CFF',timed:'#BF5AF2',memo:'#FF9F0A',checklist:'#28C840'}[e.type];

const TRASH_DAYS = 15;
purgeTrash(false);
function purgeTrash(persist=true){
  if(!S.trash) return;
  const cut = Date.now() - TRASH_DAYS*864e5;
  const before = S.trash.length;
  S.trash = S.trash.filter(t=>t.deletedAt > cut);

}
function toTrash(kind, item){

function openTrash(){
  purgeTrash();
  const icons = {ev:'📅', td:'☑️', mm:'📝', nt:'↳'};
  const rows = S.trash.map(t=>{
    const dleft = Math.max(0, TRASH_DAYS - Math.floor((Date.now()-t.deletedAt)/864e5));
    return `<div class="card row">
      <span>${icons[t.kind]||'📄'}</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.item.title||'제목 없음')}</span>
      <span class="badge">D-${dleft}</span>
      <button class="chip note-add" onclick="restoreTrash('${t.id}')">복원</button>
      <button class="x" onclick="purgeOne('${t.id}')">✕</button>
    </div>`;
  }).join('');
  openSheetHTML(`<h3>🗑 휴지통</h3>
    <p class="sub" style="margin:0 0 10px">삭제된 항목은 ${TRASH_DAYS}일간 보관 후 자동으로 사라집니다.</p>
    ${rows || '<div class="empty">휴지통이 비어 있습니다.</div>'}
    ${S.trash.length?`<button class="btn" style="background:var(--red);margin-top:10px" onclick="emptyTrash()">모두 비우기</button>`:''}`);
}
function restoreTrash(id){
  const i = S.trash.findIndex(t=>t.id===id); if(i<0) return;
  const {kind, item} = S.trash[i];
  const ensureFolderFor = (obj, folders) => {
    if(obj.folderId && folders.find(f=>f.id===obj.folderId)) return;
    obj.folderId = null; // 폴더가 사라진 경우 [미지정]으로 복원
  };
  const ensureFolder = (folders) => ensureFolderFor(item, folders);
  if(kind==='ev'){ delete item.gcalId; delete item.gdirty; gmark(item); S.events.push(item); } // 구글에는 새로 등록
  else if(kind==='td'){ ensureFolder(S.todoFolders); S.todos.push(item); }
  else if(kind==='mm'){ ensureFolder(S.memoFolders); S.memos.unshift(item); }
  else if(kind==='nt'){
    const p = findParent(item.pKind, item.pId);
    if(p){ (p.notes = p.notes||[]).push(item.note); }
    else { // 부모가 삭제된 경우 → 메모로 복원
      const m = {id:uid(), folderId:null, title:item.note.text, body:'(하위 메모에서 복원됨)', pinned:false, updated:nowStr()};
      ensureFolderFor(m, S.memoFolders); S.memos.unshift(m);
    }
  }
  S.trash.splice(i,1);
  commit(); openTrash();
}
function purgeOne(id){ S.trash = S.trash.filter(t=>t.id!==id); commit(); openTrash(); }

let _drag = null;
function _cellAt(x, y){

function _clearDrop(){

document.addEventListener('pointerdown', e=>{
  const chip = e.target.closest ? e.target.closest('.ev[data-evid]') : null;
  if(!chip) return;
  const id = chip.dataset.evid;
  const fromCell = chip.closest('.cell[data-key], .wk-day[data-key]');
  _drag = { id, from: fromCell ? fromCell.dataset.key : null, x:e.clientX, y:e.clientY, active:false,
    timer: setTimeout(()=>{
      if(!_drag) return;
      _drag.active = true;

      const g = document.createElement('div');
      g.id = 'drag-ghost'; g.textContent = '📅 ' + (ev ? ev.title : '');
      g.style.left = _drag.x+'px'; g.style.top = _drag.y+'px';
      document.body.appendChild(g);
      if(navigator.vibrate) navigator.vibrate(30);
    }, 400) };
});
document.addEventListener('pointermove', e=>{
  if(!_drag) return;
  if(!_drag.active){
    if(Math.hypot(e.clientX-_drag.x, e.clientY-_drag.y) > 12){ clearTimeout(_drag.timer); _drag = null; }
    return;
  }
  e.preventDefault();
  const g = document.getElementById('drag-ghost');
  if(g){ g.style.left = e.clientX+'px'; g.style.top = e.clientY+'px'; }
  _clearDrop();
  const cell = _cellAt(e.clientX, e.clientY);
  if(cell) cell.classList.add('drop');
}, {passive:false});
function _endDrag(e, doDrop){
  if(!_drag) return;
  clearTimeout(_drag.timer);
  const wasActive = _drag.active, id = _drag.id, from = _drag.from;
  _drag = null;
  const g = document.getElementById('drag-ghost'); if(g) g.remove();
  _clearDrop();
  if(wasActive && doDrop){
    const cell = _cellAt(e.clientX, e.clientY);
    if(cell){
      const ev = S.events.find(x=>x.id===id);
      const to = cell.dataset.key;
      if(!ev || !to) return;
      if(!normRepeat(ev)){
        if(ev.date !== to){ ev.date = to; gmark(ev); selDate = to; commit(); }
      } else if(from && from !== to){
        openMoveScopeSheet(id, from, to); // 반복 일정: 이동 범위 선택
      }
    }
  }
}

function moveOneOccur(id, from, to){

function moveAllOccur(id, from, to){
  const e = S.events.find(x=>x.id===id); if(!e) return;
  const shift = k => { const d=new Date(k+'T00:00'); d.setDate(d.getDate()+delta); return keyOf(d.getFullYear(),d.getMonth(),d.getDate()); };
  const delta = Math.round((new Date(to+'T00:00') - new Date(from+'T00:00'))/86400000);
  e.date = shift(e.date);
  if(typeof e.repeat === 'object' && e.repeat){
    if(e.repeat.days && e.repeat.days.length)
      e.repeat.days = [...new Set(e.repeat.days.map(x=>((x+delta)%7+7)%7))].sort((a,b)=>a-b);
    if(e.repeat.until) e.repeat.until = shift(e.repeat.until);

  if(e.exDates) e.exDates = e.exDates.map(shift);   // 제외 날짜도 함께 이동

/* ---------- 구글 캘린더 자동 연동 (내 계정 · 쓰기) ----------
   S.gsync가 켜져 있으면 일정의 추가·수정·삭제를 로그인 계정의
   구글 캘린더(기본 캘린더)에 반영. 실패분은 gdirty/S.gdel에 남겨
   [지금 동기화]로 재시도. */
let _gsTimer = null, _gsBusy = false;
function gmark(e){ if(S.gsync && e) e.gdirty = true; }              // 반영 필요 표시
function gdelq(e){ if(S.gsync && e && e.gcalId){ (S.gdel = S.gdel||[]).push(e.gcalId); delete e.gcalId; } }
function gsyncPending(){ return S.events.filter(e=>e.gdirty).length + (S.gdel||[]).length; }
function nextDayKey(k){ const d=new Date(k+'T00:00'); d.setDate(d.getDate()+1); return keyOf(d.getFullYear(),d.getMonth(),d.getDate()); }
function rruleOf(e){
  const r = normRepeat(e); if(!r) return null;
  const F = {daily:'DAILY', weekly:'WEEKLY', monthly:'MONTHLY', yearly:'YEARLY'};
  if(!F[r.freq]) return null;
  const BYD = ['SU','MO','TU','WE','TH','FR','SA'];
  const d0 = new Date(e.date+'T00:00');
  let s = 'RRULE:FREQ=' + F[r.freq];
  const iv = Math.max(1, r.interval||1);
  if(iv > 1) s += ';INTERVAL=' + iv;
  if(r.freq==='weekly'){
    const days = (r.days && r.days.length) ? [...r.days].sort((a,b)=>a-b) : [d0.getDay()];
    s += ';BYDAY=' + days.map(d=>BYD[d]).join(',');
  }
  if(r.freq==='monthly' && r.monthly==='nth')
    s += ';BYDAY=' + Math.ceil(d0.getDate()/7) + BYD[d0.getDay()];
  if(r.until){
    if(e.type==='timed' && e.start){ // 시간 일정: UNTIL은 UTC 일시로 (그날 끝까지)
      const u = new Date(r.until+'T23:59:59');
      s += ';UNTIL=' + u.toISOString().replace(/[-:]/g,'').slice(0,15) + 'Z';
    } else s += ';UNTIL=' + r.until.replaceAll('-','');
  }
  return s;
}
function gcalBody(e){
  const tz = (Intl.DateTimeFormat && Intl.DateTimeFormat().resolvedOptions().timeZone) || 'Asia/Seoul';
  let start, end;
  if(e.type==='timed' && e.start){
    start = { dateTime: `${e.date}T${e.start}:00`, timeZone: tz };
    let ed = e.date, et = e.end;
    if(!et || et <= e.start){ // 종료가 없거나 시작 이전이면 +1시간
      const d = new Date(`${e.date}T${e.start}:00`); d.setHours(d.getHours()+1);
      ed = keyOf(d.getFullYear(), d.getMonth(), d.getDate()); et = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    end = { dateTime: `${ed}T${et}:00`, timeZone: tz };
  } else { // 종일·메모·체크형은 종일 일정으로
    start = { date: e.date }; end = { date: nextDayKey(e.date) };
  }
  const body = { summary: e.title, start, end };
  const rr = rruleOf(e), rec = [];
  if(rr){
    rec.push(rr);
    const ex = e.exDates || [];
    if(ex.length){
      if(e.type==='timed' && e.start)
        rec.push('EXDATE;TZID=' + tz + ':' + ex.map(k=>k.replaceAll('-','') + 'T' + e.start.replace(':','') + '00').join(','));
      else rec.push('EXDATE;VALUE=DATE:' + ex.map(k=>k.replaceAll('-','')).join(','));
    }
  }
  body.recurrence = rec; // 빈 배열 = 반복 없음(수정 시 반복 해제 반영)
  return body;
}
async function gsyncFlush(interactive){
  if(!S.gsync || !window.FB || !FB.user || !FB.gcalPush) return;
  const dirty = S.events.filter(e=>e.gdirty);
  const dels = [...(S.gdel||[])];
  if(!dirty.length && !dels.length){
    if(interactive) appAlert('반영할 변경이 없습니다.', '구글 캘린더 동기화');
    return;
  }
  if(_gsBusy) return;

/* ---------- 원형 컬러휠 ---------- */
function _hsvHex(hh, ss, vv){
  const c = vv*ss, x = c*(1-Math.abs((hh/60)%2-1)), m = vv-c;
  let r=0,g=0,b=0;
  if(hh<60){r=c;g=x;} else if(hh<120){r=x;g=c;} else if(hh<180){g=c;b=x;}
  else if(hh<240){g=x;b=c;} else if(hh<300){r=x;b=c;} else {r=c;b=x;}
  const to = n => Math.round((n+m)*255).toString(16).padStart(2,'0');
  return '#'+to(r)+to(g)+to(b);
}
function _hexHsv(hex){
  const m = /^#([0-9a-f]{6})$/i.exec(hex||''); if(!m) return null;
  const r=parseInt(m[1].slice(0,2),16)/255, g=parseInt(m[1].slice(2,4),16)/255, b=parseInt(m[1].slice(4,6),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let hh=0;
  if(d){ if(mx===r) hh=60*(((g-b)/d)%6); else if(mx===g) hh=60*((b-r)/d+2); else hh=60*((r-g)/d+4); }
  if(hh<0) hh+=360;
  return {h:hh, s:mx?d/mx:0, v:mx};
}
function openColorWheel(initial, cb){
  const init = _hexHsv(initial) || {h:210, s:1, v:1};
  let H=init.h, Sv=init.s, V=Math.max(0.25, init.v);
  _modal(`<div class="modal-t">색상 직접 선택</div>
    <canvas id="cw" width="220" height="220"
      style="width:220px;height:220px;display:block;margin:12px auto 4px;border-radius:50%;touch-action:none"></canvas>
    <div class="sub" style="text-align:center;margin-bottom:2px">밝기</div>
    <input type="range" id="cw-v" min="25" max="100" value="${Math.round(V*100)}" style="width:100%;padding:0;background:none">
    <div class="row" style="margin-top:12px;justify-content:center;gap:10px">
      <span id="cw-prev" style="width:36px;height:36px;border-radius:50%;border:2px solid var(--border);flex-shrink:0"></span>
      <span id="cw-hex" class="sub"></span>
    </div>
    <div class="modal-btns">
      <button class="btn mghost" onclick="closeModal()">취소</button>
      <button class="btn" id="cw-ok">선택</button>
    </div>`);
  const cv = document.getElementById('cw');
  const upd = () => {
    const hex = _hsvHex(H, Sv, V);
    const p = document.getElementById('cw-prev'), t = document.getElementById('cw-hex');
    if(p) p.style.background = hex;
    if(t) t.textContent = hex.toUpperCase();
    return hex;
  };
  const draw = () => {
    try{
      const ctx = cv.getContext('2d'); if(!ctx) return;
      const W=220, R=W/2, img = ctx.createImageData(W, W);
      for(let y=0;y<W;y++) for(let x=0;x<W;x++){
        const dx=x-R, dy=y-R, r=Math.hypot(dx,dy);
        const i=(y*W+x)*4;
        if(r>R){ img.data[i+3]=0; continue; }
        let ang = Math.atan2(dy,dx)*180/Math.PI; if(ang<0) ang+=360;
        const hex = _hsvHex(ang, Math.min(1,r/R), V);
        img.data[i]=parseInt(hex.slice(1,3),16);
        img.data[i+1]=parseInt(hex.slice(3,5),16);
        img.data[i+2]=parseInt(hex.slice(5,7),16);
        img.data[i+3]=255;
      }
      ctx.putImageData(img,0,0);
    }catch(_){}
  };
  const pick = e => {
    try{
      const rect = cv.getBoundingClientRect();
      const x = (e.clientX-rect.left)*(220/rect.width)-110;
      const y = (e.clientY-rect.top)*(220/rect.height)-110;
      const r = Math.hypot(x,y); if(r>112) return;
      let ang = Math.atan2(y,x)*180/Math.PI; if(ang<0) ang+=360;
      H = ang; Sv = Math.min(1, r/110);
      upd();
    }catch(_){}
  };
  if(cv && cv.addEventListener){
    let down=false;
    cv.addEventListener('pointerdown', e=>{down=true; pick(e); e.preventDefault();});
    cv.addEventListener('pointermove', e=>{if(down) pick(e); e.preventDefault();});
    cv.addEventListener('pointerup', ()=>down=false);
    cv.addEventListener('pointercancel', ()=>down=false);
  }
  const sl = document.getElementById('cw-v');
  if(sl) sl.oninput = ()=>{ V = (+sl.value)/100; draw(); upd(); };
  const ok = document.getElementById('cw-ok');
  if(ok) ok.onclick = ()=>{ const hex = upd(); closeModal(); cb(hex); };
  draw(); upd();
}

/* ---------- 달력 ---------- */
/* ---------- 반복 일정 (구글 캘린더식) ----------
   repeat: 'daily'|'weekly'|'monthly' (구버전 문자열, 자동 호환) 또는
   {freq:'daily|weekly|monthly|yearly', interval:N, days:[요일], monthly:'date|nth', until:'YYYY-MM-DD', count:N}
   exDates: 개별 삭제/분리된 발생 날짜 목록 */
const DOW_KO = ['일','월','화','수','목','금','토'];
const NTH_KO = ['첫째','둘째','셋째','넷째','다섯째'];
function normRepeat(e){
  const r = e.repeat;
  if(!r || r==='none') return null;
  if(typeof r === 'string') return {freq:r, interval:1, days:null, monthly:'date', until:null, count:null};
  return r;
}
function occursOn(e, k){
  const r = normRepeat(e);
  if(!r) return e.date===k;
  if(k < e.date) return false;
  if(r.until && k > r.until) return false;
  if((e.exDates||[]).includes(k)) return false;
  const d0 = new Date(e.date+'T00:00'), d1 = new Date(k+'T00:00');
  const iv = Math.max(1, r.interval||1);
  if(r.freq==='daily'){
    return Math.round((d1-d0)/86400000) % iv === 0;
  }
  if(r.freq==='weekly'){
    const days = (r.days && r.days.length) ? r.days : [d0.getDay()];
    if(!days.includes(d1.getDay())) return false;
    const sow = d => { const x=new Date(d); x.setDate(x.getDate()-x.getDay()); return x; };
    return Math.round((sow(d1)-sow(d0))/604800000) % iv === 0;
  }
  if(r.freq==='monthly'){
    const dm = (d1.getFullYear()-d0.getFullYear())*12 + (d1.getMonth()-d0.getMonth());
    if(dm % iv !== 0) return false;
    if(r.monthly==='nth')
      return d1.getDay()===d0.getDay() && Math.ceil(d1.getDate()/7)===Math.ceil(d0.getDate()/7);
    return d1.getDate()===d0.getDate();
  }
  if(r.freq==='yearly'){
    return (d1.getFullYear()-d0.getFullYear()) % iv === 0
      && d1.getMonth()===d0.getMonth() && d1.getDate()===d0.getDate();
  }
  return e.date===k;
}
function repeatLabel(e){
  const r = normRepeat(e); if(!r) return '';
  const iv = Math.max(1, r.interval||1);
  const d0 = new Date(e.date+'T00:00');
  let s;
  if(r.freq==='daily') s = iv>1 ? `${iv}일마다` : '매일';
  else if(r.freq==='weekly'){
    const days = (r.days && r.days.length) ? [...r.days].sort((a,b)=>a-b) : [d0.getDay()];
    s = (iv>1 ? `${iv}주마다 ` : '매주 ') + days.map(d=>DOW_KO[d]).join('·');
  }
  else if(r.freq==='monthly')
    s = (iv>1 ? `${iv}개월마다 ` : '매월 ') + (r.monthly==='nth'
      ? `${NTH_KO[Math.ceil(d0.getDate()/7)-1]} ${DOW_KO[d0.getDay()]}요일` : `${d0.getDate()}일`);
  else if(r.freq==='yearly') s = iv>1 ? `${iv}년마다` : '매년';
  else s = '반복';
  if(r.count) s += ` · ${r.count}회`;
  else if(r.until) s += ` · ${r.until.replaceAll('-','.')}까지`;
  return s;
}
/* 횟수 종료 → 마지막 발생일 계산 (RRULE COUNT 방식: 개별 삭제와 무관하게 계산) */
function untilFromCount(date, rep, count){
  const probe = {date, repeat:{...rep, until:undefined, count:undefined}};
  let found = 0; const d = new Date(date+'T00:00');
  for(let g=0; g<60000; g++){
    const key = keyOf(d.getFullYear(), d.getMonth(), d.getDate());
    if(occursOn(probe, key) && ++found >= count) return key;
    d.setDate(d.getDate()+1);
  }
  return null;
}
let calView = 'month'; // 'month' | 'week'

/* 해당 날짜의 모든 표시 항목 (일정 + 공유 + 구글 + 마감 할 일) */
function dayItems(k){
  return [
    ...S.events.filter(e=>occursOn(e,k)),
    ...sharedEvents.filter(e=>e.date===k),
    ...gcalEvents.filter(e=>e.date===k),
    ...S.todos.filter(t=>t.due===k && !t.done).map(t=>({ ...t, _td:true })),
  ];
}
function chipHTML(e){
  const c = e._td ? PRI[e.priority][1] : evColor(e);
  const sh = e._sh ? '👥 ' : (e._gc ? 'Ⓖ ' : (e._td ? '☑ ' : ''));
  const drag = (!e._sh && !e._gc && !e._td) ? ` data-evid="${e.id}"` : '';
  if(!e._td && e.type==='allday')
    return `<div class="ev"${drag} style="background:${c};color:#fff">${sh}${esc(e.title)}</div>`;
  const label = (!e._td && e.type==='timed' ? e.start+' ' : '') + e.title;
  return `<div class="ev dotline"${drag}><span class="dt" style="background:${c}"></span><em>${sh}${esc(label)}</em></div>`;
}

function renderCalendar(){

function monthGridHTML(){
  const first = new Date(calY, calM, 1);
  const startDow = first.getDay();
  const dim = new Date(calY, calM+1, 0).getDate();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);
  while(cells.length%7) cells.push(null);
  const tk = todayKey();
  let grid = '';
  cells.forEach(d=>{
    if(d===null){ grid += `<div class="cell"></div>`; return; }
    const k = keyOf(calY, calM, d);
    const items = dayItems(k);
    const hol = holidayOf(k);
    const cls = `cell${k===tk?' today':''}${k===selDate?' sel':''}${hol?' hol':''}`;
    let chips = items.slice(0,2).map(chipHTML).join('');
    if(items.length>2) chips += `<div class="more">+${items.length-2}</div>`;
    grid += `<div class="${cls}" data-key="${k}" onclick="selDate='${k}';render()"><span class="d">${d}</span>${hol?`<span class="hname">${hol}</span>`:''}${chips}</div>`;
  });
  return `
    <div class="dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="grid">${grid}</div>`;
}

function weekDays(){
  const base = new Date(selDate+'T00:00');
  const start = new Date(base); start.setDate(base.getDate()-base.getDay());
  return [...Array(7)].map((_,i)=>{
    const d = new Date(start); d.setDate(start.getDate()+i);
    return keyOf(d.getFullYear(), d.getMonth(), d.getDate());
  });
}
function weekTitle(){
  const ds = weekDays();
  const f = ds[0], l = ds[6];
  return `${+f.slice(5,7)}/${+f.slice(8,10)} – ${+l.slice(5,7)}/${+l.slice(8,10)}`;
}
function weekListHTML(){
  const tk = todayKey();
  const names = ['일','월','화','수','목','금','토'];
  return `<div class="wk">` + weekDays().map((k,i)=>{
    const items = dayItems(k);
    const isToday = k===tk, isSel = k===selDate;

function navCal(delta){

  const d = new Date(selDate+'T00:00'); d.setDate(d.getDate()+7*delta);

  calY = d.getFullYear(); calM = d.getMonth();

}
function moveMonth(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} render(); }

function delEvent(id){

  }, {passive:true});
  m.addEventListener('touchmove', e=>{
    if(!_ptr || _ptrBusy) return;
    const d = e.touches[0].clientY - _ptr.y0;
    if(d <= 0 || m.scrollTop > 0){
      if(_ptr.pull > 0){ _ptr.pull = 0; _ptrHide(); }
      return;
    }
    _ptr.pull = Math.min(70, d * 0.45);
    _ptrSet(_ptr.pull >= PTR_READY
      ? '⟳ 놓으면 구글 캘린더 새로고침'
      : '↓ 당겨서 구글 캘린더 새로고침', _ptr.pull - 62);
  }, {passive:true});
  const end = ()=>{
    if(!_ptr) return;
    const go = _ptr.pull >= PTR_READY;
    _ptr = null;
    if(go) ptrRefresh(); else _ptrHide();
  };
  m.addEventListener('touchend', end);
  m.addEventListener('touchcancel', ()=>{ _ptr = null; _ptrHide(); });
})();

function contactChipsHTML(excludeEmails){
  const ex = new Set((excludeEmails||[]).map(e=>e.toLowerCase()));

  if(!list.length) return `<p class="sub" style="margin:0 0 8px">등록된 연락처가 없습니다. 👤 → 연락처에서 추가할 수 있어요.</p>`;

    `<button class="chip ${shSel.has(c.email)?'on':''}" onclick="shTgl('${encodeURIComponent(c.email)}')">${esc(c.nick)}</button>`
  ).join('')}</div>`;
}

  shSel = new Set();
  window._shSheet = () => {

      <button class="btn" onclick="submitShare('${eventId}')">공유 시작 ${shSel.size?`(${shSel.size}명 선택됨)`:''}</button>`);

function shTgl(enc){
  const em = decodeURIComponent(enc);
  if(shSel.has(em)) shSel.delete(em); else shSel.add(em);
  if(window._shSheet) window._shSheet();
}
function submitShare(eventId){
  const raw = document.getElementById('sh-emails').value;
  const typed = raw.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s.includes('@'));
  const emails = [...new Set([...shSel, ...typed])];
  if(!emails.length){ appAlert('연락처를 선택하거나 이메일을 입력해주세요.'); return; }
  const e = S.events.find(x=>x.id===eventId); if(!e) return;
  FB.shareCreate(e, emails).then(()=>{
    S.events = S.events.filter(x=>x.id!==eventId); // 로컬 → 공유로 전환
    closeSheet(); commit();
  }).catch(err=>appAlert(err.message, '공유 실패'));
}

let noteOpen = {}; // 입력창 펼침 상태
function findParent(kind, id){
  return kind==='ev' ? S.events.find(x=>x.id===id)
       : kind==='td' ? S.todos.find(x=>x.id===id)
       : S.memos.find(x=>x.id===id);
}
function notesHTML(kind, item){
  const notes = item.notes || [];
  const key = kind + item.id;
  const list = notes.map(n=>{
    if(kind==='td' && inlineNote===item.id+'|'+n.id){   // 하위 메모 바로 수정 (v8.8)
      return `
    <div class="note" style="align-items:flex-start;cursor:default">
      <input type="checkbox" ${n.done?'checked':''} onclick="event.stopPropagation()" onchange="toggleNoteDone('td','${item.id}','${n.id}')">
      <textarea id="itn-in" data-keep rows="1" style="flex:1;min-width:0;font-size:12.5px;line-height:1.5;padding:6px 9px;resize:none"
        oninput="qaGrow(this)" onkeydown="itnKey(event,'${item.id}','${n.id}')">${esc(n.text)}</textarea>
      <button class="x" style="color:var(--blue);font-weight:700;opacity:1" title="저장" onclick="event.stopPropagation();saveInlineNote('${item.id}','${n.id}')">✓</button>
      <button class="x" title="취소" onclick="event.stopPropagation();cancelInlineNote()">✕</button>
    </div>`;
    }
    return `
    <div class="note" ${kind==='td'?'style="cursor:default"':`onclick="editNote('${kind}','${item.id}','${n.id}')"`}>
      ${kind==='td'?`<input type="checkbox" ${n.done?'checked':''} onclick="event.stopPropagation()" onchange="toggleNoteDone('${kind}','${item.id}','${n.id}')">`:''}
      <span class="${kind==='td'&&n.done?'done':''}" ${kind==='td'?`style="cursor:pointer" onclick="startInlineNote('${item.id}','${n.id}')"`:''}>${esc(n.text)}</span>
      <button class="x" onclick="event.stopPropagation();delNote('${kind}','${item.id}','${n.id}')">✕</button>
    </div>`;
  }).join('');
  const input = noteOpen[key]
    ? `<input class="note-in" id="note-in-${key}" data-keep placeholder="하위 메모 입력 후 엔터" autofocus
         onkeydown="if(event.key==='Enter'&&this.value.trim()){addNote('${kind}','${item.id}',this.value.trim());}">`
    : '';
  return `<div class="notes" style="display:${notes.length||noteOpen[key]?'flex':'none'}">${list}${input}</div>
    <button class="chip note-add" onclick="toggleNoteInput('${kind}','${item.id}')" style="margin-top:6px">
      ${noteOpen[key]?'입력 닫기':'＋ 하위 메모'}${notes.length?` (${notes.length})`:''}</button>`;
}
function toggleNoteDone(kind,id,nid){          // 할 일 하위 메모 체크 (v8.6)
  const p = findParent(kind,id); if(!p || !p.notes) return;
  const n = p.notes.find(x=>x.id===nid); if(!n) return;
  n.done = !n.done; commit();
}
function toggleNoteInput(kind,id){
  const key = kind+id;
  noteOpen[key] = !noteOpen[key];
  render();
  if(curMemoId && kind==='mm') renderEditorNotes();
}
function editNote(kind,id,nid){
  const p = findParent(kind,id); if(!p || !p.notes) return;
  const n = p.notes.find(x=>x.id===nid); if(!n) return;
  appPrompt('내용을 수정하세요.', n.text, v=>{
    if(v && v.trim()){
      n.text = v.trim();
      if(kind==='mm' && p.updated!==undefined) p.updated = nowStr();
      commit();
      if(kind==='mm') renderEditorNotes();
    }
  }, {title:'하위 메모 수정', yes:'저장'});
}
function addNote(kind,id,text){
  const p = findParent(kind,id); if(!p) return;
  (p.notes = p.notes || []).push({id:uid(), text});
  if(kind==='mm' && p.updated!==undefined) p.updated = nowStr();
  commit();
  if(kind==='mm') renderEditorNotes();
}
function delNote(kind,id,nid){
  const p = findParent(kind,id); if(!p || !p.notes) return;
  const n = p.notes.find(x=>x.id===nid);
  if(n) toTrash('nt', {title:n.text, note:n, pKind:kind, pId:id});
  p.notes = p.notes.filter(x=>x.id!==nid);
  commit();
  if(kind==='mm') renderEditorNotes();
}

function openAddEvent(){ openEventSheet(null); }
function openEventSheet(editId, scope){
  const orig = editId ? S.events.find(x=>x.id===editId) : null;
  /* 반복 일정 수정: 적용 범위 먼저 선택 */
  if(orig && normRepeat(orig) && !scope){
    openSheetHTML(`<h3>반복 일정 수정</h3>
      <p class="sub" style="margin:0 0 12px">${esc(orig.title)} · ${selDate.replaceAll('-','. ')} · ${repeatLabel(orig)}</p>
      <button class="btn" style="margin-bottom:8px" onclick="openEventSheet('${editId}','one')">이 일정만 수정</button>
      <button class="btn" onclick="openEventSheet('${editId}','all')">모든 반복 일정 수정</button>`);
    return;
  }
  const detach = scope==='one';
  let type = orig ? orig.type : 'allday';
  let color = (orig && orig.color) || PALETTE[0];
  let dateVal = detach ? selDate : (orig ? orig.date : selDate);
  let r = null; // 반복 편집 상태 (null = 없음)
  if(orig && !detach){
    const nr = normRepeat(orig);
    if(nr) r = {freq:nr.freq, interval:nr.interval||1, days:nr.days?[...nr.days]:null,
      monthly:nr.monthly||'date', end:nr.count?'count':(nr.until?'until':'none'),
      until:nr.until||'', count:nr.count||''};
  }
  const FREQ = [['none','없음'],['daily','매일'],['weekly','매주'],['monthly','매월'],['yearly','매년']];
  const UNIT = {daily:'일', weekly:'주', monthly:'개월', yearly:'년'};
  const repeatOptsHTML = () => {
    if(!r) return '';
    const d0 = new Date(dateVal+'T00:00');
    let h = `<div class="chips" style="align-items:center">
      <span class="sub" style="font-size:12px;flex-shrink:0">간격</span>
      <input type="number" id="ae-iv" min="1" max="99" value="${r.interval}" style="width:58px;font-size:12px;padding:7px 8px">
      <span class="sub" style="font-size:12px;flex-shrink:0">${UNIT[r.freq]}마다</span></div>`;
    if(r.freq==='weekly'){
      const days = (r.days && r.days.length) ? r.days : [d0.getDay()];
      h += `<div class="chips">${DOW_KO.map((n,i)=>
        `<button class="chip ${days.includes(i)?'on':''}" onclick="window._aeDay(${i})">${n}</button>`).join('')}</div>`;
    }
    if(r.freq==='monthly'){
      h += `<div class="chips">
        <button class="chip ${r.monthly!=='nth'?'on':''}" onclick="window._aeMon('date')">매월 ${d0.getDate()}일</button>
        <button class="chip ${r.monthly==='nth'?'on':''}" onclick="window._aeMon('nth')">${NTH_KO[Math.ceil(d0.getDate()/7)-1]} ${DOW_KO[d0.getDay()]}요일</button></div>`;
    }
    h += `<div class="chips" style="align-items:center">
      <span class="sub" style="font-size:12px;flex-shrink:0">종료</span>
      ${[['none','계속'],['until','날짜'],['count','횟수']].map(([k,l])=>
        `<button class="chip ${r.end===k?'on':''}" onclick="window._aeEnd('${k}')">${l}</button>`).join('')}
      ${r.end==='until'?`<input type="date" id="ae-until" value="${r.until||''}" style="width:auto;font-size:12px;padding:7px 8px">`:''}
      ${r.end==='count'?`<input type="number" id="ae-cnt" min="1" max="500" value="${r.count||10}" style="width:64px;font-size:12px;padding:7px 8px"><span class="sub" style="font-size:12px;flex-shrink:0">회</span>`:''}
    </div>`;
    return h;
  };
  const html = () => `
    <h3>${detach ? '이 일정만 수정' : orig ? '일정 수정' : selDate.replaceAll('-','. ')+' 일정 추가'}</h3>
    <input type="date" id="ae-date" value="${dateVal}" onchange="window._aeDate(this.value)" style="margin-bottom:10px">
    <div class="chips">${Object.entries(TYPES).map(([k,[l]])=>
      `<button class="chip ${type===k?'on':''}" onclick="window._setType('${k}')">${l}</button>`).join('')}</div>
    <input id="ae-title" placeholder="제목" value="${orig ? esc(orig.title) : ''}" style="margin-bottom:10px">
    <div class="row" id="ae-times" style="display:${type==='timed'?'flex':'none'};margin-bottom:10px">
      <input type="time" id="ae-start" value="${orig && orig.start ? orig.start : '09:00'}">
      <input type="time" id="ae-end" value="${orig && orig.end ? orig.end : '10:00'}">
    </div>
    ${detach ? `<p class="sub" style="margin:0 0 10px">이 날짜의 일정만 단일 일정으로 분리되어 수정됩니다.</p>` : `
    <div class="sub" style="margin-bottom:4px">반복</div>
    <div class="chips">${FREQ.map(([k,l])=>
      `<button class="chip ${(r?r.freq:'none')===k?'on':''}" onclick="window._setFreq('${k}')">${l}</button>`).join('')}</div>
    ${repeatOptsHTML()}`}
    <div class="sub" style="margin-bottom:4px">색상</div>
    <div class="swatches">${(color && !PALETTE.includes(color)) ?
        `<button class="sw on" style="background:${color}"></button>` : ''}${PALETTE.map(c=>
      `<button class="sw ${color===c?'on':''}" style="background:${c}" onclick="window._setColor('${c}')"></button>`).join('')}<button class="sw rainbow" title="직접 선택" onclick="window._pickColor()"></button></div>
    <button class="btn" onclick="window._submitEvent()">${orig && !detach ? '저장' : detach ? '이 일정만 저장' : '추가'}</button>`;
  const val = id => { const el = document.getElementById(id); return el ? el.value : null; };
  const snap = () => ({ti:val('ae-title'), dt:val('ae-date'), s:val('ae-start'), en:val('ae-end'),
    iv:val('ae-iv'), ut:val('ae-until'), ct:val('ae-cnt')});
  const restore = o => { const set=(id,v)=>{ const el=document.getElementById(id); if(el && v!=null) el.value=v; };
    set('ae-title',o.ti); set('ae-date',o.dt); set('ae-start',o.s); set('ae-end',o.en);
    set('ae-iv',o.iv); set('ae-until',o.ut); set('ae-cnt',o.ct); };
  const keep = fn => { const o = snap(); fn(); openSheetHTML(html()); restore(o); };
  window._aeDate = v => keep(()=>{ if(v) dateVal = v; });
  window._setType = t => keep(()=>type=t);
  window._setColor = c => keep(()=>color=c);
  window._setFreq = f => keep(()=>{
    if(f==='none'){ r = null; return; }
    if(!r) r = {freq:f, interval:1, days:null, monthly:'date', end:'none', until:'', count:''};
    else r.freq = f;
    if(f==='weekly' && (!r.days || !r.days.length)) r.days = [new Date(dateVal+'T00:00').getDay()];
  });
  window._aeDay = i => keep(()=>{
    if(!r) return;
    if(!r.days || !r.days.length) r.days = [new Date(dateVal+'T00:00').getDay()];
    if(r.days.includes(i)){ if(r.days.length > 1) r.days = r.days.filter(x=>x!==i); }
    else r.days = [...r.days, i].sort((a,b)=>a-b);
  });
  window._aeMon = m => keep(()=>{ if(r) r.monthly = m; });
  window._aeEnd = m => keep(()=>{ if(r) r.end = m; });
  window._pickColor = () => {
    const o = snap();
    openColorWheel(color, c=>{ color = c; openSheetHTML(html()); restore(o); });
  };
  window._submitEvent = () => {
    const title = (val('ae-title')||'').trim();
    const date = val('ae-date') || selDate;
    if(!title){ appAlert('제목을 입력하세요.'); return; }
    let rep; // undefined = 반복 없음
    if(r && !detach){
      rep = {freq:r.freq, interval:Math.min(99, Math.max(1, parseInt(val('ae-iv'))||1))};
      if(rep.interval===1) delete rep.interval;
      if(r.freq==='weekly') rep.days = ((r.days && r.days.length) ? [...r.days] : [new Date(date+'T00:00').getDay()]).sort((a,b)=>a-b);
      if(r.freq==='monthly' && r.monthly==='nth') rep.monthly = 'nth';
      if(r.end==='until'){ const u = val('ae-until'); if(u && u >= date) rep.until = u; }
      else if(r.end==='count'){
        const c = Math.min(500, Math.max(1, parseInt(val('ae-cnt'))||0));
        if(c > 0){ rep.count = c; const u = untilFromCount(date, rep, c); if(u) rep.until = u; }
      }
    }
    if(detach){
      /* 시리즈에서 이 날짜 제외 + 단일 일정으로 분리 */
      (orig.exDates = orig.exDates||[]).push(selDate);
      const ev = {id:uid(), date, type, title, color};
      if(type==='timed'){ ev.start = val('ae-start'); ev.end = val('ae-end'); }
      if(type==='checklist') ev.items = (orig.items||[]).map(it=>({...it}));
      S.events.push(ev);
      gmark(orig); gmark(ev);
    } else if(orig){
      orig.title = title; orig.date = date; orig.type = type; orig.color = color;
      orig.repeat = rep;
      if(!rep) delete orig.exDates;
      if(type==='timed'){ orig.start = val('ae-start'); orig.end = val('ae-end'); }
      if(type==='checklist' && !orig.items) orig.items = [];
      gmark(orig);
    } else {
      const ev = {id:uid(), date, type, title, color};
      if(rep) ev.repeat = rep;
      if(type==='timed'){ ev.start = val('ae-start'); ev.end = val('ae-end'); }
      if(type==='checklist') ev.items = [];
      S.events.push(ev);
      gmark(ev);
    }
    selDate = date;
    sheetSaved(); commit();
  };
  openSheetHTML(html());
  document.getElementById('ae-title').focus();
  /* 작성 중 닫기 확인 (v8.6) */
  const _init = { type, color };
  const _base = { title: orig ? orig.title : '', date: detach ? selDate : (orig ? orig.date : selDate),
    start: (orig && orig.start) || '09:00', end: (orig && orig.end) || '10:00' };
  _sheetGuard = {
    dirty(){
      const el = document.getElementById('ae-title'); if(!el) return false;
      const t = (el.value||'').trim();
      if(!orig) return !!t;
      return t !== _base.title || (val('ae-date')||'') !== _base.date
        || type !== _init.type || color !== _init.color
        || (type==='timed' && ((val('ae-start')||'') !== _base.start || (val('ae-end')||'') !== _base.end));
    },
    save(){ window._submitEvent(); }
  };
}

/* ---------- To-do ---------- */
function renderTodo(){
  const folders = S.todoFolders;
  const chips = `<div class="chips wrap">
    <button class="chip ${todoFolder==='ALL'?'on':''}" onclick="todoFolder='ALL';render()">전체</button>
    ${folders.map(f=>`<button class="chip ${todoFolder===f.id?'on':''}" onclick="selectTodoFolderChip('${f.id}')"><span class="fdot" style="background:${f.color||'#8E8E93'}"></span>${S.defTodoFolder===f.id?'★ ':''}${esc(f.name)}</button>`).join('')}
    <button class="chip ${todoFolder==='NONE'?'on':''}" onclick="todoFolder='NONE';render()">미지정</button>
    <button class="chip" onclick="promptTodoFolder()">＋ 폴더</button>
  </div>`;
  const filters = `<div class="chips">
    ${[['all','전체'],['open','미완료'],['done','완료']].map(([k,l])=>
      `<button class="chip ${todoFilter===k?'on':''}" onclick="todoFilter='${k}';render()">${l}</button>`).join('')}
    <select style="width:auto;font-size:12px;padding:6px 10px;margin-left:auto" onchange="todoSort=this.value;render()">
      ${[['created','생성순'],['due','마감일순'],['priority','우선순위순']].map(([k,l])=>
        `<option value="${k}" ${todoSort===k?'selected':''}>${l}</option>`).join('')}
    </select>
    <button class="chip ${selMode?'on':''}" style="margin-left:6px"
      onclick="${selMode?'exitSel()':'enterSel()'}">선택</button>
  </div>`;

  let list = S.todos.filter(t=> todoFolder==='ALL' || (todoFolder==='NONE' ? isNoneFid('todo', t.folderId) : t.folderId===todoFolder))
    .filter(t=> todoFilter==='all'?true: todoFilter==='open'? !t.done : t.done);
  if(todoSort==='due') list=[...list].sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999'));
  else if(todoSort==='priority'){ const r={high:0,mid:1,low:2}; list=[...list].sort((a,b)=>r[a.priority]-r[b.priority]); }
  else list=[...list].sort((a,b)=>a.created-b.created);

  const tk = todayKey();
  const rows = list.map(t=>{
    const over = t.due && !t.done && t.due < tk;
    const fObj = folders.find(f=>f.id===t.folderId);
    const folder = todoFolder==='ALL' ? `<span class="sub">${esc(fObj?.name||'미지정')}</span>` : '';
    if(selMode){
      const on = selIds.has(t.id);
      return `<div class="card" onclick="toggleSel('${t.id}')"
        style="border-left:3px solid ${fObj?.color||'transparent'};${on?'background:var(--blue-soft);':''}cursor:pointer">
        <div class="todo">
          <span class="selring ${on?'on':''}"></span>
          <span class="dot" style="background:${PRI[t.priority][1]};width:7px;height:7px"></span>
          <span class="t ${t.done?'done':''}">${esc(t.title)}</span>
          ${folder}
          ${t.due?`<span class="badge ${over?'over':''}">${t.due.slice(5).replace('-','/')}</span>`:''}
        </div>
      </div>`;
    }
    if(inlineTodo===t.id){                       // 목록에서 바로 수정 (v8.6)
      return `<div class="card" style="border-left:3px solid ${fObj?.color||'transparent'}">
        <div class="todo" style="align-items:flex-start">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
          <textarea id="ite-in" data-keep rows="2" style="flex:1;min-width:0;font-size:13px;line-height:1.5;padding:8px 10px;resize:none"
            onkeydown="iteKey(event,'${t.id}')">${esc(t.title)}</textarea>
          <button class="x" style="color:var(--blue);font-weight:700" title="저장" onclick="saveInlineTodo('${t.id}')">✓</button>
          <button class="x" title="취소" onclick="cancelInlineTodo()">✕</button>
        </div>
        <div class="sub" style="margin:4px 0 0 27px;font-size:10.5px">✓ 저장 · ✕ 취소 · Enter 줄바꿈</div>
        ${notesHTML('td', t)}
      </div>`;
    }
    return `<div class="card" style="border-left:3px solid ${fObj?.color||'transparent'}">
      <div class="todo tw">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
        <div class="tcol">
          <span class="t ${t.done?'done':''}" onclick="startInlineTodo('${t.id}')">${esc(t.title)}</span>
          <div class="tmeta">
            <span class="dot" title="중요도 ${PRI[t.priority][0]}" style="background:${PRI[t.priority][1]};width:8px;height:8px"></span>
            ${folder}
            ${t.due?`<span class="badge ${over?'over':''}">${t.due.slice(5).replace('-','/')}</span>`:''}
            <span class="sp"></span>
            <button class="x" onclick="openEditTodo('${t.id}')">${ICO_EDIT}</button>
            <button class="x" onclick="delTodo('${t.id}')">✕</button>
          </div>
        </div>
      </div>
      ${notesHTML('td', t)}
    </div>`;
  }).join('');
  _selPool = selMode ? list.map(t=>t.id) : [];

  return chips + filters + (rows || `<div class="empty">표시할 할 일이 없습니다.<br>아래 입력줄로 바로 추가하세요.</div>`)
    + `<div style="height:74px"></div>`
    + (selMode ? selBarHTML('td') : qaBarHTML('todo'));
}

/* ---------- 폴더 관리 (선택된 폴더를 한 번 더 탭) ---------- */
function selectTodoFolderChip(id){
  if(todoFolder===id) manageFolder('todo', id);
  else { todoFolder=id; render(); }
}
function selectMemoFolderChip(id){
  if(memoFolder===id) manageFolder('memo', id);
  else { memoFolder=id; render(); }
}
function manageFolder(kind, id){
  const arr = kind==='todo' ? S.todoFolders : S.memoFolders;
  const f = arr.find(x=>x.id===id); if(!f) return;
  const cnt = kind==='todo'
    ? S.todos.filter(t=>t.folderId===id).length
    : S.memos.filter(m=>m.folderId===id).length;
  const isDef = (kind==='todo' ? S.defTodoFolder : S.defMemoFolder) === id;
  openSheetHTML(`<h3>폴더: ${esc(f.name)}${isDef?' ★':''}</h3>
    <p class="sub" style="margin:0 0 10px">포함된 항목 ${cnt}개${isDef?' · 기본 폴더 (새 항목이 여기로 추가됩니다)':''}</p>
    <div class="sub" style="margin-bottom:4px">폴더 색상</div>
    <div class="swatches">${(f.color && !PALETTE.includes(f.color)) ?
        `<button class="sw on" style="background:${f.color}"></button>` : ''}${PALETTE.map(c=>
      `<button class="sw ${(f.color||'')===c?'on':''}" style="background:${c}" onclick="setFolderColor('${kind}','${id}','${c}')"></button>`).join('')}<button class="sw rainbow" title="직접 선택"
        onclick="openColorWheel('${f.color||''}', c=>setFolderColor('${kind}','${id}',c))"></button></div>
    <button class="btn" style="margin-bottom:8px" onclick="toggleDefFolder('${kind}','${id}')">${isDef?'기본 폴더 해제 (미지정으로)':'★ 기본 폴더로 지정'}</button>
    <button class="btn" style="margin-bottom:8px" onclick="renameFolder('${kind}','${id}')">이름 변경</button>
    <button class="btn" style="background:var(--red)" onclick="deleteFolder('${kind}','${id}')">폴더 삭제</button>`);
}
function toggleDefFolder(kind, id){
  if(kind==='todo') S.defTodoFolder = S.defTodoFolder===id ? null : id;
  else S.defMemoFolder = S.defMemoFolder===id ? null : id;
  commit(); manageFolder(kind, id); // 시트 갱신
}
function setFolderColor(kind, id, color){
  const arr = kind==='todo' ? S.todoFolders : S.memoFolders;
  const f = arr.find(x=>x.id===id); if(!f) return;
  f.color = color;
  commit(); manageFolder(kind, id); // 시트 갱신
}
function renameFolder(kind, id){
  const arr = kind==='todo' ? S.todoFolders : S.memoFolders;
  const f = arr.find(x=>x.id===id); if(!f) return;
  appPrompt('새 이름을 입력하세요.', f.name, name=>{
    if(name && name.trim()){ f.name = name.trim(); closeSheet(); commit(); }
  }, {title:'폴더 이름 변경', yes:'저장'});
}
function deleteFolder(kind, id){
  if(kind==='todo'){
    const n = S.todos.filter(t=>t.folderId===id).length;
    appConfirm(`이 폴더와 포함된 할 일 ${n}개가 휴지통으로 이동합니다.`, ()=>{
    S.todos.filter(t=>t.folderId===id).forEach(t=>toTrash('td', t));
    S.todos = S.todos.filter(t=>t.folderId!==id);
    S.todoFolders = S.todoFolders.filter(f=>f.id!==id);
    if(S.defTodoFolder===id) S.defTodoFolder=null;
    if(todoFolder===id) todoFolder='ALL';
    closeSheet(); commit();
    }, {title:'폴더 삭제', danger:true, yes:'삭제'});
  } else {
    const n = S.memos.filter(m=>m.folderId===id).length;
    appConfirm(`이 폴더와 포함된 메모 ${n}개가 휴지통으로 이동합니다.`, ()=>{
    S.memos.filter(m=>m.folderId===id).forEach(m=>toTrash('mm', m));
    S.memos = S.memos.filter(m=>m.folderId!==id);
    S.memoFolders = S.memoFolders.filter(f=>f.id!==id);
    if(S.defMemoFolder===id) S.defMemoFolder=null;
    if(memoFolder===id) memoFolder = 'ALL';
    closeSheet(); commit();
    }, {title:'폴더 삭제', danger:true, yes:'삭제'});
  }
}
function delTodo(id){
  const t = S.todos.find(x=>x.id===id); if(!t) return;
  toTrash('td', t);
  S.todos = S.todos.filter(x=>x.id!==id); commit();
}

function renderMemo(){
  const chips = `<div class="chips wrap">
    <button class="chip ${memoFolder==='ALL'?'on':''}" onclick="memoFolder='ALL';render()">전체</button>
    ${S.memoFolders.map(f=>`<button class="chip ${memoFolder===f.id?'on':''}" onclick="selectMemoFolderChip('${f.id}')"><span class="fdot" style="background:${f.color||'#8E8E93'}"></span>${S.defMemoFolder===f.id?'★ ':''}${esc(f.name)}</button>`).join('')}
    <button class="chip ${memoFolder==='NONE'?'on':''}" onclick="memoFolder='NONE';render()">미지정</button>
    <button class="chip" onclick="promptMemoFolder()">＋ 폴더</button>
    <button class="chip ${selMode?'on':''}" onclick="${selMode?'exitSel()':'enterSel()'}">선택</button>
  </div>`;
  const list = S.memos.filter(m=> memoFolder==='ALL' || (memoFolder==='NONE' ? isNoneFid('memo', m.folderId) : m.folderId===memoFolder))
    .sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0) || b.updated.localeCompare(a.updated));
  const rows = list.map(m=>{
    const bc = (S.memoFolders.find(f=>f.id===m.folderId)?.color)||'transparent';
    if(selMode){
      const on = selIds.has(m.id);
      return `<div class="card memo-item" onclick="toggleSel('${m.id}')"
        style="border-left:3px solid ${bc};${on?'background:var(--blue-soft);':''}">
        <div class="row"><span class="selring ${on?'on':''}"></span>
          <div style="flex:1;min-width:0">
            <div class="ttl">${m.pinned?'📌 ':''}${esc(m.title||'제목 없음')}</div>
            <div class="pv">${m.updated.slice(5,16)} · ${esc((m.body||'').split('\n')[0]||'내용 없음')}</div>
          </div></div>
      </div>`;
    }
    return `<div class="card memo-item" onclick="openEditor('${m.id}')"
      style="border-left:3px solid ${bc}">
      <div class="row" style="align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="ttl">${m.pinned?'📌 ':''}${esc(m.title||'제목 없음')}</div>
          <div class="pv">${m.updated.slice(5,16)}${memoFolder==='ALL'?` · ${esc(S.memoFolders.find(f=>f.id===m.folderId)?.name||'미지정')}`:''}${(m.notes||[]).length?` · 하위 ${m.notes.length}`:''} · ${esc((m.body||'').split('\n')[0]||'내용 없음')}</div>
        </div>
        <button class="x" title="삭제" onclick="event.stopPropagation();delMemoQuick('${m.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  _selPool = selMode ? list.map(m=>m.id) : _selPool;
  return chips + (rows || `<div class="empty">메모가 없습니다.<br>아래 입력줄로 바로 추가하세요.</div>`)
    + `<div style="height:74px"></div>`
    + (selMode ? selBarHTML('mm') : qaBarHTML('memo'));
}
function promptMemoFolder(){
  appPrompt('폴더 이름을 입력하세요.', '', name=>{
    if(name && name.trim()){ const f={id:uid(),name:name.trim()}; S.memoFolders.push(f); memoFolder=f.id; commit(); }
  }, {title:'새 폴더', yes:'만들기'});
}
/* 메모 에디터 (v8.6): 자동 저장 → ✓ 저장 + 닫을 때 변경사항 확인,
   빈 메모(공백 포함)는 저장되지 않음, 폴더도 에디터에서 선택 */
function addMemo(){
  edDraft = { id: uid(), pinned: false };            // 저장 전 초안 (S.memos에 넣지 않음)
  curMemoId = null;
  edFid = qaFidResolve('memo');                      // 빠른 추가와 동일한 기본 폴더 규칙
  _openEditorUI('', '', '새 메모 · ✓ 또는 닫을 때 저장', false);
  renderEditorNotes();
  const ti = document.getElementById('ed-title');
  if(ti){ try{ ti.focus(); }catch(_){} }
}
function openEditor(id){
  const m = S.memos.find(m=>m.id===id); if(!m) return;
  curMemoId = id; edDraft = null;
  edFid = validFid('memo', m.folderId);
  _openEditorUI(m.title, m.body, '수정: '+m.updated, m.pinned);
  renderEditorNotes();
}
function _openEditorUI(t, b, upd, pinned){
  document.getElementById('ed-title').value = t;
  document.getElementById('ed-body').value = b;
  document.getElementById('ed-updated').textContent = upd;
  document.getElementById('pin-btn').style.opacity = pinned ? '1' : '0.4';
  edSnap = { t, b, f: edFid };
  renderEdFolders();
  const ed = document.getElementById('editor');
  if(!ed.classList.contains('open')){ _ovEditor=true; _pushOv(); }
  ed.classList.add('open');
  hardenInputs();
}
function renderEdFolders(){                          // 에디터 내 폴더 선택 칩 (v8.6)
  const box = document.getElementById('ed-folders'); if(!box) return;
  box.innerHTML = S.memoFolders.map(f=>
    `<button class="chip ${edFid===f.id?'on':''}" onclick="setEdFid('${f.id}')"><span class="fdot" style="background:${f.color||'#8E8E93'}"></span>${S.defMemoFolder===f.id?'★ ':''}${esc(f.name)}</button>`).join('')
    + `<button class="chip ${edFid===null?'on':''}" onclick="setEdFid(null)">미지정</button>`;
}
function setEdFid(v){ edFid = validFid('memo', v); renderEdFolders(); }
function renderEditorNotes(){
  const box = document.getElementById('ed-notes'); if(!box) return;
  if(edDraft){ box.innerHTML = `<div class="sub">하위 메모는 저장(✓) 후 사용할 수 있습니다.</div>`; return; }
  const m = S.memos.find(m=>m.id===curMemoId);
  if(!m){ box.innerHTML=''; return; }
  box.innerHTML = notesHTML('mm', m);
}
function _memoFieldVals(){
  const ti = document.getElementById('ed-title'), bo = document.getElementById('ed-body');
  return { t: ti ? ti.value : '', b: bo ? bo.value : '' };
}
function saveMemoNow(){                              // ✓ 저장 (열린 채 유지)
  const { t, b } = _memoFieldVals();
  if(edDraft){
    if(!t.trim() && !b.trim()){ appAlert('제목이나 내용을 입력하세요.', '메모 저장'); return; }
    const m = { id: edDraft.id, folderId: edFid||null, title: t, body: b, pinned: edDraft.pinned, updated: nowStr() };
    S.memos.unshift(m);
    curMemoId = m.id; edDraft = null;
    save();
    edSnap = { t, b, f: edFid };
    document.getElementById('ed-updated').textContent = '수정: '+m.updated;
    renderEditorNotes();
    return;
  }
  const m = S.memos.find(x=>x.id===curMemoId); if(!m) return;
  m.title = t; m.body = b; m.folderId = edFid||null; m.updated = nowStr();
  save();
  edSnap = { t, b, f: edFid };
  document.getElementById('ed-updated').textContent = '수정: '+m.updated;
}
function _editorCloseFlow(){                          // 닫기 공통 (뒤로가기 포함)
  const { t, b } = _memoFieldVals();
  const ed = document.getElementById('editor');
  if(edDraft){
    const d = edDraft, f = edFid;
    edDraft = null; curMemoId = null;
    ed.classList.remove('open'); render();
    if(!t.trim() && !b.trim()) return;                // 빈 메모는 저장하지 않음
    appConfirm('작성 중인 메모가 있습니다.\n저장할까요?', ()=>{
      S.memos.unshift({ id:d.id, folderId:f||null, title:t, body:b, pinned:d.pinned, updated:nowStr() });
      commit();
    }, {title:'메모 저장', yes:'저장', no:'저장 안 함'});
    return;
  }
  const m = S.memos.find(x=>x.id===curMemoId);
  const dirty = !!m && (t !== edSnap.t || b !== edSnap.b || edFid !== edSnap.f);
  const f = edFid;
  curMemoId = null;
  ed.classList.remove('open'); render();
  if(dirty){
    appConfirm('변경사항을 저장할까요?', ()=>{
      m.title = t; m.body = b; m.folderId = f||null; m.updated = nowStr(); commit();
    }, {title:'메모 저장', yes:'저장', no:'저장 안 함'});
  }
}
function closeEditor(){
  const wasOv = _ovEditor; _ovEditor = false;
  _editorCloseFlow();
  if(wasOv) _consumeOv();
}
function togglePin(){
  if(edDraft){
    edDraft.pinned = !edDraft.pinned;
    document.getElementById('pin-btn').style.opacity = edDraft.pinned ? '1' : '0.4';
    return;
  }
  const m = S.memos.find(m=>m.id===curMemoId); if(!m) return;
  m.pinned = !m.pinned; m.updated = nowStr(); save();
  document.getElementById('pin-btn').style.opacity = m.pinned? '1':'0.4';
}
function _forceCloseEditor(){
  document.getElementById('editor').classList.remove('open');
  if(_ovEditor){ _ovEditor=false; _consumeOv(); }
  render();
}
function deleteMemo(){
  if(edDraft){
    appConfirm('작성 중인 메모를 저장하지 않고 닫을까요?', ()=>{
      edDraft = null; curMemoId = null; _forceCloseEditor();
    }, {title:'메모 닫기', danger:true, yes:'닫기'});
    return;
  }
  appConfirm('이 메모를 삭제할까요?\n휴지통에 15일간 보관됩니다.', ()=>{
    const m = S.memos.find(x=>x.id===curMemoId);
    if(m) toTrash('mm', m);
    S.memos = S.memos.filter(x=>x.id!==curMemoId);
    curMemoId = null; save(); _forceCloseEditor();
  }, {title:'메모 삭제', danger:true, yes:'삭제'});
}
/* 목록에서 바로 삭제 (v8.6) */
function delMemoQuick(id){
  const m = S.memos.find(x=>x.id===id); if(!m) return;
  appConfirm(`"${m.title||'제목 없음'}"\n메모를 휴지통으로 이동할까요?`, ()=>{
    toTrash('mm', m);
    S.memos = S.memos.filter(x=>x.id!==id);
    if(curMemoId===id) curMemoId = null;
    commit();
  }, {title:'메모 삭제', danger:true, yes:'삭제'});
}

/* ---------- 검색 ---------- */
function openSearch(){ searchMode=true; searchQ=''; searchScope='all'; render(); }
let searchScope = 'all'; // 'all' | 'ev' | 'td' | 'mm'
function renderSearch(){
  const q = searchQ.toLowerCase();
  let out = `<input id="search-in" placeholder="일정 · 할 일 · 메모 검색" value="${esc(searchQ)}"
      oninput="searchQ=this.value;refreshSearch()" style="margin:6px 0 4px">
    <div class="chips">${[['all','전체'],['ev','달력'],['td','To-do'],['mm','메모']].map(([k,l])=>
      `<button class="chip ${searchScope===k?'on':''}" onclick="searchScope='${k}';render()">${l}</button>`).join('')}</div>
    <div id="search-out">`;
  out += searchResultsHTML(q) + `</div>`;
  return out;
}
function refreshSearch(){
  document.getElementById('search-out').innerHTML = searchResultsHTML(searchQ.toLowerCase());
}
function searchResultsHTML(q){
  if(!q.trim()) return `<div class="empty" style="margin-top:10px">검색어를 입력하세요.</div>`;
  const nt = x => (x.notes||[]).map(n=>n.text).join('\n');
  const sc = searchScope;
  const ev = (sc==='all'||sc==='ev') ? S.events.filter(e=>(e.title+'\n'+nt(e)).toLowerCase().includes(q)) : [];
  const td = (sc==='all'||sc==='td') ? S.todos.filter(t=>(t.title+'\n'+nt(t)).toLowerCase().includes(q)) : [];
  const mm = (sc==='all'||sc==='mm') ? S.memos.filter(m=>(m.title+'\n'+m.body+'\n'+nt(m)).toLowerCase().includes(q)) : [];
  const total = ev.length+td.length+mm.length;
  if(!total) return `<div class="empty" style="margin-top:10px">결과가 없습니다.</div>`;
  let h = `<div class="sub" style="margin:6px 2px">${total}개 항목</div>`;
  if(ev.length) h += `<div class="sec">일정</div>` + ev.map(e=>`
    <div class="card row" onclick="jumpDate('${e.date}')">
      <span class="dot" style="background:${evColor(e)}"></span>
      <span style="flex:1;font-size:13px">${esc(e.title)}</span><span class="sub">${e.date}</span>
    </div>`).join('');
  if(td.length) h += `<div class="sec">할 일</div>` + td.map(t=>`
    <div class="card row" onclick="jumpTodo('${t.folderId}')">
      <span class="dot" style="background:${PRI[t.priority][1]}"></span>
      <span style="flex:1;font-size:13px">${esc(t.title)}</span>
      <span class="sub">${esc(S.todoFolders.find(f=>f.id===t.folderId)?.name||'미지정')}</span>
    </div>`).join('');
  if(mm.length) h += `<div class="sec">메모</div>` + mm.map(m=>`
    <div class="card" onclick="jumpMemo('${m.folderId}','${m.id}')">
      <div style="font-size:13px;font-weight:600">${esc(m.title||'제목 없음')}</div>
      <div class="pv sub">${esc((m.body||'').split('\n')[0])}</div>
    </div>`).join('');
  return h;
}
function jumpDate(d){ searchMode=false; tab=0; selDate=d; const [y,m]=d.split('-'); calY=+y; calM=+m-1; render(); }
function jumpTodo(fid){ searchMode=false; tab=1; todoFolder = validFid('todo', fid) || 'NONE'; render(); }
function jumpMemo(fid,id){ searchMode=false; tab=2; memoFolder = validFid('memo', fid) || 'NONE'; render(); openEditor(id); }
